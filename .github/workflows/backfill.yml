name: backfill

on:
  workflow_dispatch:
    inputs:
      from:
        description: "First year to backfill (House data reaches back to 2014)"
        required: false
        default: "2014"
      to:
        description: "Last year to backfill (default: current year)"
        required: false
      chamber:
        description: "Chamber to ingest: house, senate, or both"
        required: false
        default: "house"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      CONGRESSKIT_USER_AGENT: "congresskit ${{ secrets.CONTACT_EMAIL || 'contact@example.com' }}"
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build CLI
        run: cargo build --release --bin congresskit-cli
      - name: Backfill
        run: |
          ARGS="--from ${{ inputs.from }} --chamber ${{ inputs.chamber }}"
          if [ -n "${{ inputs.to }}" ]; then ARGS="$ARGS --to ${{ inputs.to }}"; fi
          ./target/release/congresskit-cli backfill $ARGS
      - name: Commit data
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add data/
          git diff --cached --quiet || git commit -m "chore(data): backfill via workflow_dispatch"
          git push
